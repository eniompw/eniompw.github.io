<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Snake Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; }
        canvas { background: #111; border: 2px solid #0f0; }
        h1 { color: #0f0; text-align: center; }
    </style>
</head>
<body>
    <canvas id="game" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const grid = 20;
        let count = 0;
        let snake = [{x: 160, y: 160}];
        let dx = grid;
        let dy = 0;
        let food = {x: 320, y: 320};
        let gameOver = false;

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min) / grid) * grid + min;
        }

        function resetFood() {
            food.x = getRandomInt(0, canvas.width - grid);
            food.y = getRandomInt(0, canvas.height - grid);
        }

        function gameLoop() {
            if (gameOver) return;
            requestAnimationFrame(gameLoop);
            if (++count < 4) return;
            count = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Move snake
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // Check collision with food
            if (head.x === food.x && head.y === food.y) {
                resetFood();
            } else {
                snake.pop();
            }

            // Draw food
            ctx.fillStyle = '#f00';
            ctx.fillRect(food.x, food.y, grid, grid);

            // Draw snake
            ctx.fillStyle = '#0f0';
            snake.forEach((segment, i) => {
                ctx.fillRect(segment.x, segment.y, grid, grid);
                // Check collision with self
                if (i > 0 && head.x === segment.x && head.y === segment.y) {
                    gameOver = true;
                    setTimeout(() => alert('Game Over!'), 10);
                }
            });

            // Check wall collision
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                gameOver = true;
                setTimeout(() => alert('Game Over!'), 10);
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' && dx === 0) {
                dx = -grid; dy = 0;
            } else if (e.key === 'ArrowUp' && dy === 0) {
                dx = 0; dy = -grid;
            } else if (e.key === 'ArrowRight' && dx === 0) {
                dx = grid; dy = 0;
            } else if (e.key === 'ArrowDown' && dy === 0) {
                dx = 0; dy = grid;
            }
        });

        resetFood();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
